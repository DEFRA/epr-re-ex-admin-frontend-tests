name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm install -g npm@11.12.1
      - run: |
          npm ci --ignore-scripts
          npm run format:check
          npm run lint
          npm run test:unit

  type-check:
    name: Lint Types - Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint types
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          COMMENT_FILE: ${{ runner.temp }}/lint-types-tests-comment.md
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # disable setup-node's tsc problem matcher: we summarise via the script
          echo "::remove-matcher owner=tsc::"

          OUTPUT=$(npm run lint:types 2>&1) || true
          echo "$OUTPUT"

          echo "$OUTPUT" \
            | node scripts/lint-types-tests-summary.js \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: lint-types-tests
          path: ${{ runner.temp }}/lint-types-tests-comment.md

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build .

  tests:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout journey-tests repo
        uses: actions/checkout@v6

      - name: Run journey tests
        uses: ./run-journey-tests
        with:
          branch: ${{ github.head_ref }}
          journey-test-pr: true
