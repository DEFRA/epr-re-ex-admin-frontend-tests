################################################################################
# Docker Compose file for starting up the service for testing in GitHub workflow
# This template provides comparable infrastructure to the real environment.
#   - mongodb
#   - redis
#   - floci (s3, sqs, sns)
#
# Mongo has init scripts included for setting up resources on startup. Floci's
# resources (buckets, queues) are created by the one-shot floci-init container,
# which other services wait on via service_completed_successfully.
#
# It also includes a selenium-chrome container for running the browser headless.
#
# The services being tested can either be started up here using the latest
# builds from dockerhub.
# In the example each service has a .env config file in docker/config/
# Services can reference each other by their container names.
# e.g. http://cdp-example-node-backend:3001/
#
################################################################################
name: epr-re-ex-admin-frontend-tests

services:
  ################################################################################
  # Headless browser, used by the test suite to actually run the tests against the
  # containers.
  selenium-chrome:
    image: selenium/standalone-chrome:135.0
    ports:
      - 4444:4444
    network_mode: host

  ################################################################################
  floci:
    image: hectorvent/floci:1.5.5
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - 4566:4566

  floci-init:
    image: amazon/aws-cli:2.34.36
    entrypoint: /bin/sh
    command: /setup/init.sh
    depends_on:
      floci:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./docker/scripts/floci:/setup:ro

  ################################################################################
  redis:
    image: redis:8.0.6-alpine3.21
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      start_period: 2s
      retries: 5

  ################################################################################
  cdp-uploader:
    image: defradigital/cdp-uploader:1.15.0
    ports:
      - '7337:7337'
    depends_on:
      floci-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - 'docker/config/aws.env'
    environment:
      PORT: 7337
      NODE_ENV: development
      APP_BASE_URL: http://localhost:7337
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: true
      MOCK_VIRUS_SCAN_ENABLED: true
      MOCK_VIRUS_RESULT_DELAY: 3
      SQS_ENDPOINT: http://floci:4566
      S3_ENDPOINT: http://floci:4566
      # Floci requires path-form queue URLs (/<account>/<name>) for ReceiveMessage;
      # cdp-uploader's baked defaults are bare names — override them here.
      SQS_SCAN_RESULTS: http://floci:4566/000000000000/cdp-clamav-results
      SQS_SCAN_RESULTS_CALLBACK: http://floci:4566/000000000000/cdp-uploader-scan-results-callback.fifo
      SQS_DOWNLOAD_REQUESTS: http://floci:4566/000000000000/cdp-uploader-download-requests
      SQS_MOCK_CLAMAV: http://floci:4566/000000000000/mock-clamav
      CONSUMER_BUCKETS: re-ex-summary-logs,re-ex-overseas-sites

  ################################################################################
  #
  # Add the services you want to test below.
  #
  ################################################################################
  epr-re-ex-admin-frontend:
    image: defradigital/epr-re-ex-admin-frontend:${EPR_RE_EX_ADMIN_FRONTEND:-latest}
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/example-frontend.env
    environment:
      PORT: 3002
      NODE_ENV: development
      REDIS_HOST: redis
      EPR_BACKEND_URL: http://epr-backend:3001
      ENTRA_TENANT_ID: tenantId
      ENTRA_CLIENT_ID: clientId
      ENTRA_CLIENT_SECRET: test
      OIDC_WELL_KNOWN_CONFIGURATION_URL: http://epr-re-ex-entra-stub:3010/.well-known/openid-configuration
      USE_SINGLE_INSTANCE_CACHE: true
      CDP_UPLOADER_URL: http://localhost:7337
    depends_on:
      redis:
        condition: service_healthy
      epr-re-ex-entra-stub:
        condition: service_healthy
    ports:
      - 3002:3002
    healthcheck:
      test: ["CMD", "curl", "http://localhost:3002/health"]
      interval: 3s
      start_period: 2s
      retries: 3

  epr-re-ex-entra-stub:
    image: defradigital/epr-re-ex-entra-stub:latest
    ports:
      - 3010:3010
    environment:
      STUB_INTERNAL_URL: http://epr-re-ex-entra-stub:3010
    healthcheck:
      test: ["CMD", "curl", "http://localhost:3010/health"]
      interval: 3s
      start_period: 2s
      retries: 3

  mongodb:
    image: mongo:8.2.7
    restart: always
    ports:
      - 27017:27017
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      start_period: 5s
      retries: 3

  epr-backend:
    image: defradigital/epr-backend:${EPR_BACKEND:-latest}
    links:
      - 'floci:floci'
      - 'mongodb:mongodb'
    depends_on:
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      cdp-uploader:
        condition: service_started
    env_file:
      - ./docker/config/defaults.env
    environment:
      APP_BASE_URL: http://epr-backend:3001
      PORT: 3001
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
      GOVUK_NOTIFY_API_KEY: fake-key-for-testing
      FEATURE_FLAG_DEV_ENDPOINTS: true
      FEATURE_FLAG_REPORTS: true
      ENTRA_OIDC_WELL_KNOWN_CONFIGURATION_URL: http://epr-re-ex-entra-stub:3010/.well-known/openid-configuration
      ADMIN_UI_ENTRA_CLIENT_ID: clientId
      SERVICE_MAINTAINER_EMAILS: '["ea@test.gov.uk"]'
      CDP_UPLOADER_URL: http://cdp-uploader:7337
      SQS_ENDPOINT: http://floci:4566
    ports:
      - '3001:3001'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 5s
      start_period: 10s
      retries: 5
